<form #registerForm="ngForm" (ngSubmit)="register()">

    <h1 class="text-center text-primary"> sign up</h1>

    <div class="form-group">
        <input type="text" class="form-control" name="userName" [(ngModel)]="model.userName" placeholder="User Name">
    </div>
    <div class="form-group">
        <input type="password" class="form-control" name="password" [(ngModel)]="model.password" placeholder="Password">
    </div>


    <div class="form-group">
        <label>Who is your favorite user?</label>
        <select class="form-control">
            <option value="">--Please select value</option>
            <option *ngFor="let user of usersFromHomeComponents" [value]="user.userName">{{user.userName}} </option>
        
        </select>
    </div>

    <div class="form-group text-center">
        <button class="btn btn-success mr-3" type="submit">Register</button>
        <button class="btn btn-default mr-1" (click)="cancelled()" type="button">Cancel</button>
    </div>

</form>
